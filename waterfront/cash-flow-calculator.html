function b64d(s){const b=atob(s);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function dec(pass){const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,b64d(CT));
 return new TextDecoder().decode(pt);}
async function tryUnlock(pass,fromSession){
 try{const html=await dec(pass);sessionStorage.setItem('mk_pass',pass);document.open();document.write(html);document.close();}
 catch(e){if(!fromSession){document.getElementById('err').textContent='Wrong passphrase. Try again.';}}}
document.getElementById('go').onclick=()=>tryUnlock(document.getElementById('pw').value,false);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock(document.getElementById('pw').value,false);});
const saved=sessionStorage.getItem('mk_pass');if(saved)tryUnlock(saved,true);
